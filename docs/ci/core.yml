name: Core API

on:
  push:
    paths:
      - ".github/workflows/core.yml"
      - "services/core/**"
      - "scripts/dubhe-config.ps1"
      - "scripts/smoke-core-workflow.ps1"
      - "packages/contracts/openapi/dubhe-core.json"
  pull_request:
    paths:
      - ".github/workflows/core.yml"
      - "services/core/**"
      - "scripts/dubhe-config.ps1"
      - "scripts/smoke-core-workflow.ps1"
      - "packages/contracts/openapi/dubhe-core.json"

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        working-directory: services/core
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        working-directory: services/core
        run: python -m ruff check .

      - name: Test
        working-directory: services/core
        run: python -m pytest

      - name: Start Core for smoke
        shell: pwsh
        working-directory: services/core
        run: |
          New-Item -ItemType Directory -Force -Path ..\..\.dubhe-run | Out-Null
          $process = Start-Process `
            -FilePath python `
            -ArgumentList @("-m", "uvicorn", "dubhe_core.main:app", "--host", "127.0.0.1", "--port", "8000") `
            -WorkingDirectory . `
            -RedirectStandardOutput ..\..\.dubhe-run\ci-core.log `
            -RedirectStandardError ..\..\.dubhe-run\ci-core.err.log `
            -WindowStyle Hidden `
            -PassThru
          $process.Id | Set-Content ..\..\.dubhe-run\ci-core.pid
          $ready = $false
          foreach ($attempt in 1..60) {
            try {
              $health = Invoke-RestMethod -Uri "http://127.0.0.1:8000/health" -TimeoutSec 2
              if ($health.status -eq "ok" -and $health.service -eq "dubhe-core") {
                $ready = $true
                break
              }
            } catch {
              Start-Sleep -Seconds 1
            }
          }
          if (-not $ready) {
            Get-Content ..\..\.dubhe-run\ci-core.err.log -ErrorAction SilentlyContinue
            throw "Dubhe Core did not become healthy for smoke test."
          }

      - name: Core workflow smoke
        shell: pwsh
        run: .\scripts\smoke-core-workflow.ps1 -Json

      - name: Stop smoke Core
        if: always()
        shell: pwsh
        run: |
          if (Test-Path .\.dubhe-run\ci-core.pid) {
            $processId = [int](Get-Content .\.dubhe-run\ci-core.pid)
            Stop-Process -Id $processId -Force -ErrorAction SilentlyContinue
          }

      - name: Export OpenAPI
        working-directory: services/core
        run: python scripts/export_openapi.py

      - name: Verify OpenAPI is committed
        shell: pwsh
        run: |
          if (git status --short packages/contracts/openapi/dubhe-core.json) {
            git diff -- packages/contracts/openapi/dubhe-core.json
            throw "OpenAPI contract is out of date. Run services/core/scripts/test.ps1 and commit the result."
          }
