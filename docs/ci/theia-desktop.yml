name: Theia Desktop Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/theia-desktop.yml"
      - "apps/theia-desktop/**"

permissions:
  contents: read

jobs:
  windows:
    name: Windows setup and portable
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: apps/theia-desktop
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Yarn 1
        run: npm install --global yarn@1.22.22

      - name: Install dependencies
        run: yarn install --ignore-engines --network-timeout 600000

      - name: Build Theia app
        run: yarn build

      - name: Build Windows packages
        run: yarn dist:windows

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: dubhe-theia-windows
          if-no-files-found: error
          retention-days: 14
          path: |
            apps/theia-desktop/app/dist/Dubhe-*-win-x64-setup.exe
            apps/theia-desktop/app/dist/Dubhe-*-win-x64-portable.exe
            apps/theia-desktop/app/dist/Dubhe-*-win-x64-setup.exe.blockmap

  macos:
    name: macOS ${{ matrix.arch }} dmg and zip
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-26
            script: dist:mac:arm64
          - arch: x64
            runner: macos-26-intel
            script: dist:mac:x64
    defaults:
      run:
        working-directory: apps/theia-desktop
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Yarn 1
        run: npm install --global yarn@1.22.22

      - name: Install dependencies
        run: yarn install --ignore-engines --network-timeout 600000

      - name: Build Theia app
        run: yarn build

      - name: Build macOS package
        run: yarn ${{ matrix.script }}

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: dubhe-theia-macos-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 14
          path: |
            apps/theia-desktop/app/dist/*.dmg
            apps/theia-desktop/app/dist/*.zip
            apps/theia-desktop/app/dist/*.blockmap
